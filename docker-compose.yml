version: "3.9"

services:
  db:
    image: mariadb:11.4
    container_name: printanista_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: printanista
      MYSQL_USER: printanista
      MYSQL_PASSWORD: printanista123
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .
    container_name: printanista_app
    restart: always
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: printanista
      DB_USER: printanista
      DB_PASSWORD: printanista123
    ports:
      - "8000:8000"

volumes:
  mariadb_data: